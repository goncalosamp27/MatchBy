name: "User Story"
description: "Template for drafting user stories, including acceptance criteria and completion requirements"
title: "[S-${{ inputs.story_id }}] <short summary here>"
labels: ["feature", "user-story"]
assignees: []

body:
  - type: input
    id: story_id
    attributes:
      label: "Story ID"
      description: "Enter the unique story identifier (e.g., 001, 102, 245)."
      placeholder: "e.g., 123"

  - type: input
    id: user_type
    attributes:
      label: "User Type"
      description: "Specify who the user is (e.g., admin, customer, developer)."
      placeholder: "e.g., customer"

  - type: input
    id: user_goal
    attributes:
      label: "User Goal"
      description: "Describe what the user wants to do."
      placeholder: "e.g., view their order history"

  - type: input
    id: user_benefit
    attributes:
      label: "Intended Benefit"
      description: "Explain why the user wants this feature — what value or outcome they get."
      placeholder: "e.g., easily track past purchases"

  - type: markdown
    attributes:
      value: |
        ## User Story

        **As** a ${{ inputs.user_type }},  
        **I want** ${{ inputs.user_goal }},  
        **So that** ${{ inputs.user_benefit }}.

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Define the conditions that must be satisfied for this story to be accepted (use checklist format)."
      value: |
        - [ ] Condition 1
        - [ ] Condition 2
        - [ ] Condition 3

  - type: textarea
    id: done_definition
    attributes:
      label: "Completion Definition"
      description: "Specify the items that confirm this story is finished (use checklist format)."
      value: |
        - [ ] Every acceptance criterion is fulfilled
        - [ ] Code has been reviewed and merged
        - [ ] Automated tests written and successful
        - [ ] Documentation updated as needed
        - [ ] Released to production environment

  - type: textarea
    id: notes
    attributes:
      label: "Notes / Dependencies"
      description: "Include relevant background information, dependencies, or clarifications."
