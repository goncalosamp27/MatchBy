name: Build and Deploy (Production) - MatchBy
'on':
  push:
    branches:
      - production
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x
      - name: Restore dependencies
        run: dotnet restore MatchBy.sln
      - name: Build with dotnet
        run: dotnet build MatchBy.sln --configuration Release --no-restore
      - name: Run tests
        run: >-
          dotnet test MatchBy.sln --configuration Release --no-build
          --verbosity normal --logger "trx;LogFileName=test-results.trx"
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/test-results.trx'
          reporter: dotnet-trx
          fail-on-error: true
      - name: dotnet publish
        run: >-
          dotnet publish MatchBy/MatchBy/MatchBy.csproj -c Release -o
          ${{env.DOTNET_ROOT}}/myapp --no-build
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: '${{env.DOTNET_ROOT}}/myapp'
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      - name: Deploy to Azure Web App using publish profile
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: MatchBy
          slot-name: Production
          publish-profile: '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PRODUCTION }}'
          package: .
